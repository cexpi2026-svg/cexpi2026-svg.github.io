  <div id="listings-section" class="card hidden">
    <h2>All Listings</h2>

      <p>Loading listings...</p>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://cexpi-backend-pwgi.onrender.com';
let piToken = null;
let walletAddress = null;

Pi.init({ version: "2.0", sandbox: false });

let currentUser = null;
let allListings = [];

    // ================= SECURITY HELPERS =================
    // يمنع XSS المخزّن: أي نص قادم من إعلانات مستخدمين آخرين يُعرض دائماً بعد تنقيته
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // يتأكد أن الصورة هي data URL لصورة فعلية أو رابط Cloudinary آمن قبل عرضها
    // (يمنع كسر الوسم أو حقن محتوى من إعلانات مستخدمين آخرين)
    function isSafeImageSrc(src) {
      if (typeof src !== 'string') return false;
      const isDataUrl = /^data:image\/(jpeg|jpg|png|gif|webp);base64,[A-Za-z0-9+/]+={0,2}$/.test(src);
      const isCloudinaryUrl = /^https:\/\/res\.cloudinary\.com\/[A-Za-z0-9_-]+\/image\/upload\/.+$/.test(src);
      return isDataUrl || isCloudinaryUrl;
    }

    // يعرض رسالة ظاهرة داخل الصفحة (بديل موثوق عن alert الذي قد يُحجب داخل Pi Browser)
    // كما يطبع الرسالة في console.log حتى تظهر عند فحص الصفحة من المتصفح
    function showMessage(elementId, message, isError) {
      console.log((isError ? '[ERROR] ' : '[INFO] ') + elementId + ': ' + message);
      const el = document.getElementById(elementId);
      if (!el) return;
      el.textContent = message;
      el.style.color = isError ? '#f44336' : '#2e7d32';
    }

    // === CLOUDINARY: رفع الصور مباشرة من المتصفح إلى Cloudinary ===
    // يستبدل التحويل القديم إلى base64 (الذي كان يعلّق الصفحة بدون أي خطأ إذا فشلت
    // قراءة أي صورة). الآن: كل صورة تُرفع مباشرة، ونحصل على رابط قصير وآمن (secure_url)
    // يُخزَّن في MongoDB بدل الصورة نفسها.
    async function uploadImagesToCloudinary(files) {
      if (!files || files.length === 0) return [];

      // نطلب توقيع رفع آمن من السيرفر (صالح لمدة قصيرة، مرتبط بالمستخدم المصادق فقط)
      const sigRes = await fetch(`${BACKEND_URL}/api/cloudinary-signature`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${piToken}`
        },
        body: JSON.stringify({})
      });
      if (!sigRes.ok) {
        const err = await sigRes.json().catch(() => ({}));
        throw new Error(err.error || 'Failed to prepare image upload');
      }
      const sig = await sigRes.json();

      const uploadedUrls = [];
      let index = 0;
      for (const file of files) {
        index++;
        showMessage('listingMsg', `Uploading image ${index} of ${files.length}...`, false);

        const formData = new FormData();
        formData.append('file', file);
        formData.append('api_key', sig.apiKey);
        formData.append('timestamp', sig.timestamp);
        formData.append('signature', sig.signature);
        formData.append('folder', sig.folder);

        const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${sig.cloudName}/image/upload`, {
          method: 'POST',
          body: formData
        });

        const uploadData = await uploadRes.json();
        if (!uploadRes.ok || !uploadData.secure_url) {
          throw new Error(`Failed to upload image ${index}: ${(uploadData.error && uploadData.error.message) || 'Unknown error'}`);
        }

        uploadedUrls.push(uploadData.secure_url);
      }

      return uploadedUrls;
    }

    // ================= PROMO A2U CLAIM =================
async function checkPromoStatus() {
  if (!currentUser || !piToken) return;
  try {
    const res = await fetch(`${BACKEND_URL}/api/promo-status`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${piToken}`
      },
      body: JSON.stringify({})
    });
    const data = await res.json();
    const statusEl = document.getElementById('promo-status');
    const btn = document.getElementById('claim-promo-btn');

    if (data.alreadyClaimed) {
      statusEl.innerText = "✅ You already claimed your 0.1 Pi reward!";
      btn.style.display = 'none';
    } else if (data.isEligible) {
      statusEl.innerText = `🎉 ${data.slotsLeft} slot(s) left! Be among the first 5 to claim 0.1 Pi.`;
      btn.style.display = 'inline-block';
    } else {
      statusEl.innerText = "❌ Promo limit reached. No slots left.";
      btn.style.display = 'none';
    }
  } catch (e) {
    console.error("Promo status error:", e);
  }
}

document.getElementById('claim-promo-btn').onclick = async () => {
  const btn = document.getElementById('claim-promo-btn');
  btn.disabled = true;
  btn.innerText = "Processing...";

  try {
    const res = await fetch(`${BACKEND_URL}/api/claim-promo`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${piToken}`
      },
      body: JSON.stringify({})
    });
    const data = await res.json();

    if (!data.success) {
      alert("Error: " + (data.error || "Claim failed"));
      btn.disabled = false;
      btn.innerText = "🎁 Claim 0.1 Pi (First 5 Users Only)";
      return;
    }

    alert(`🎉 Success! 0.1 Pi sent to your wallet.\nTXID: ${data.txid}`);
    checkPromoStatus();

  } catch (e) {
    alert("Network error. Please try again.");
    btn.disabled = false;
    btn.innerText = "🎁 Claim 0.1 Pi (First 5 Users Only)";
  }
};

    function onIncompletePaymentFound(payment) {
      alert("Pending payment detected. Completing it automatically...");
      fetch(`${BACKEND_URL}/api/complete-payment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          paymentId: payment.identifier,
          txid: payment.transaction ? payment.transaction.txid : null
        })
      });
      return Promise.resolve();
    }

    document.getElementById('login-btn').onclick = async () => {
     if (!document.getElementById('acceptPolicies').checked) {
    alert("You must accept the Terms of Service and Privacy Policy to continue.");
    return;
  }
      try {
        const scopes = ['username', 'payments', 'wallet_address'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        piToken = auth.accessToken;
        currentUser = auth.user;

      walletAddress = auth.user.wallet_address;


        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('listings-section').classList.remove('hidden');
        document.getElementById('status').innerHTML = `Welcome ${escapeHtml(currentUser.username)}!`;

        loadListings();
        checkPromoStatus(); 
      } catch (err) {
        alert("Login error: " + err.message);
        console.error(err);
      }
    };

    

    document.getElementById('images').onchange = (e) => {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      const files = e.target.files;
      if (files.length > 6) {
        alert("Maximum 6 images allowed");
        e.target.value = '';
        return;
      }
      const MAX_IMAGE_BYTES = 1024 * 1024; // 1MB لكل صورة، يطابق حد السيرفر
      for (let file of files) {
        if (file.size > MAX_IMAGE_BYTES) {
          alert(`Image "${file.name}" is too large. Max size is 1MB per image.`);
          e.target.value = '';
          preview.innerHTML = '';
          return;
        }
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      }
    };

    document.getElementById('add-listing-btn').onclick = async () => {
      if (!currentUser || !piToken) return alert("Please login first");
      showMessage('paymentMsg', 'Setting up payment...', false);

      const payRes = await fetch(`${BACKEND_URL}/api/create-listing-payment`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${piToken}`
        },
        body: JSON.stringify({})
      });
      const payData = await payRes.json();
      if (!payData.success) {
        showMessage('paymentMsg', 'Payment setup failed: ' + (payData.error || payRes.status), true);
        return alert("Payment setup failed");
      }

      const payment = {
        amount: 0.5,
        memo: payData.memo,
        metadata: payData.metadata
      };

      const callbacks = {
        onReadyForServerApproval: async (paymentId) => {
          showMessage('paymentMsg', 'Approving payment...', false);
          try {
            const r = await fetch(`${BACKEND_URL}/api/approve-payment`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${piToken}`
              },
              body: JSON.stringify({ paymentId })
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              console.error('Approve payment failed:', r.status, err);
              showMessage('paymentMsg', 'Payment approval failed: ' + (err.error || ('HTTP ' + r.status)), true);
              alert("Payment approval failed: " + (err.error || ('HTTP ' + r.status)));
            } else {
              showMessage('paymentMsg', 'Payment approved, waiting for confirmation...', false);
            }
          } catch (e) {
            console.error('Approve payment network error:', e);
            showMessage('paymentMsg', 'Network error while approving payment: ' + e.message, true);
            alert("Network error while approving payment: " + e.message);
          }
        },
        onReadyForServerCompletion: async (paymentId, txid) => {
          try {
            const r = await fetch(`${BACKEND_URL}/api/complete-payment`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentId, txid })
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              console.error('Complete payment failed:', r.status, err);
              showMessage('paymentMsg', 'Payment completion failed: ' + (err.error || ('HTTP ' + r.status)), true);
              alert("Payment completion failed: " + (err.error || ('HTTP ' + r.status)));
              return;
            }
            showMessage('paymentMsg', 'Payment successful! Now fill in your listing details.', false);
            alert("Payment successful! Now fill in your listing details.");
            document.getElementById('add-listing-btn').classList.add('hidden');
            document.getElementById('listing-form').classList.remove('hidden');
          } catch (e) {
            console.error('Complete payment network error:', e);
            showMessage('paymentMsg', 'Network error while completing payment: ' + e.message, true);
            alert("Network error while completing payment: " + e.message);
          }
        },
        onCancel: () => showMessage('paymentMsg', 'Payment cancelled', true),
        onError: (error) => showMessage('paymentMsg', 'Payment error: ' + error.message, true)
      };

      Pi.createPayment(payment, callbacks);
    };

    document.getElementById('submit-listing-btn').onclick = async () => {
     if (!document.getElementById('termsCheckbox').checked) {
  showMessage('listingMsg', 'You must accept the disclaimer to publish your listing.', true);
  return;
}

      const submitBtn = document.getElementById('submit-listing-btn');
      submitBtn.disabled = true;

      try {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const priceInPi = parseFloat(document.getElementById('priceInPi').value);
        const category = document.getElementById('category').value;
        const make = document.getElementById('make').value.trim();
        const model = document.getElementById('model').value.trim();
        const year = document.getElementById('year').value ? parseInt(document.getElementById('year').value) : null;
        const mileage = document.getElementById('mileage').value ? parseInt(document.getElementById('mileage').value) : null;
        const country = document.getElementById('country').value;
        const region = document.getElementById('region').value.trim();
        const phoneNumber = document.getElementById('phoneNumber').value.trim();
        const imageFiles = document.getElementById('images').files;

        if (!title || !description || isNaN(priceInPi) || !category || !country || !region || !phoneNumber) {
          showMessage('listingMsg', 'Please fill all required fields (*)', true);
          submitBtn.disabled = false;
          return;
        }

        if (imageFiles.length > 6) {
          showMessage('listingMsg', 'Maximum 6 images allowed', true);
          submitBtn.disabled = false;
          return;
        }

        // === CLOUDINARY: رفع الصور مباشرة بدل تحويلها إلى base64 ===
        const images = await uploadImagesToCloudinary(Array.from(imageFiles));

        showMessage('listingMsg', 'Publishing your listing...', false);

        const res = await fetch(`${BACKEND_URL}/api/complete-listing`, {
          method: 'POST',
          headers: {
  'Content-Type': 'application/json',
  'Authorization': `Bearer ${piToken}`
},

          body: JSON.stringify({
            title,
            description,
            priceInPi,
            category,
            make,
            model,
            year,
            mileage,
            country,
            region,
            images,
            phoneNumber
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || ('Failed to publish listing (HTTP ' + res.status + ')'));
        }

        showMessage('listingMsg', 'Listing published successfully!', false);
        alert("Listing published successfully!");
        document.getElementById('listing-form').classList.add('hidden');
        document.getElementById('add-listing-btn').classList.remove('hidden');
        loadListings();
      } catch (err) {
        console.error(err);
        showMessage('listingMsg', 'Publish error: ' + err.message, true);
        alert("Publish error: " + err.message);
      } finally {
        submitBtn.disabled = false;
      }
    };

    async function loadListings() {
      const listDiv = document.getElementById('listings-list');
      listDiv.innerHTML = '<p>Loading listings...</p>';

      try {
        const res = await fetch(`${BACKEND_URL}/api/get-listings`);
        if (!res.ok) {
          throw new Error(`HTTP error! status: ${res.status}`);
        }

        const data = await res.json();
        
       allListings = data.listings || [];

// ⬅️ هذا السطر هو الحل
populateCountryFilter();

applyFilters();

      } catch (err) {
        listDiv.innerHTML = `<p style="color:red;">Error loading listings: ${escapeHtml(err.message)}</p>`;
        console.error("Load listings error:", err);
      }
    }
function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const selectedCountry = document.getElementById('countryFilter').value;

  const filtered = allListings.filter(listing => {

    // فلتر البحث
    const matchesSearch =
      listing.title?.toLowerCase().includes(searchTerm) ||
      listing.make?.toLowerCase().includes(searchTerm) ||
      listing.model?.toLowerCase().includes(searchTerm) ||
      listing.region?.toLowerCase().includes(searchTerm) ||
      listing.country?.toLowerCase().includes(searchTerm);

    // فلتر الدولة
    const matchesCountry =
      !selectedCountry || listing.country === selectedCountry;

    return matchesSearch && matchesCountry;
  });

  displayListings(filtered);
}

    function displayListings(listings) {
      const listDiv = document.getElementById('listings-list');
      listDiv.innerHTML = '';

      if (listings.length === 0) {
        listDiv.innerHTML = '<p>No listings available yet. Be the first to publish one!</p>';
        return;
      }

      listings.forEach(listing => {
        const item = document.createElement('div');
        item.classList.add('listing-item');

        // كل القيم القادمة من قاعدة البيانات (وقد تكون من مستخدمين آخرين) تُنقّى دائماً قبل العرض
        item.innerHTML = `
          <h3>${escapeHtml(listing.title || 'No title')}</h3>
          <p><strong>Price:</strong> ${escapeHtml(listing.priceInPi)} Pi</p>
          <p><strong>Category:</strong> ${escapeHtml(listing.category || 'N/A')}</p>
          <p><strong>Make:</strong> ${escapeHtml(listing.make || 'N/A')}</p>
          <p><strong>Model:</strong> ${escapeHtml(listing.model || 'N/A')}</p>
          <p><strong>Year:</strong> ${escapeHtml(listing.year || 'N/A')}</p>
          <p><strong>Mileage:</strong> ${listing.mileage ? escapeHtml(listing.mileage) + ' km' : 'N/A'}</p>
          <p><strong>Country:</strong> ${escapeHtml(listing.country || 'N/A')}</p>
          <p><strong>Region:</strong> ${escapeHtml(listing.region || 'N/A')}</p>
          <p><strong>Phone:</strong> ${escapeHtml(listing.phoneNumber || 'N/A')}</p>
          <p><strong>Description:</strong> ${escapeHtml(listing.description || 'No description')}</p>
        `;

        if (listing.images && listing.images.length > 0) {
          const imagesWrap = document.createElement('div');
          imagesWrap.classList.add('listing-images');
          listing.images.forEach(imgSrc => {
            if (isSafeImageSrc(imgSrc)) {
              const imgEl = document.createElement('img');
              imgEl.src = imgSrc;
              imgEl.alt = 'Vehicle image';
              imagesWrap.appendChild(imgEl);
            }
          });
          if (imagesWrap.childNodes.length > 0) {
            item.appendChild(imagesWrap);
          }
        }

        if (currentUser && listing.sellerUid === currentUser.uid) {
          const deleteBtn = document.createElement('button');
          deleteBtn.classList.add('btn-delete');
          deleteBtn.textContent = 'Delete Listing';
          deleteBtn.onclick = async () => {
            if (confirm("Are you sure you want to delete this listing?")) {
              const delRes = await fetch(`${BACKEND_URL}/api/delete-listing`, {
                method: 'POST',
               headers: {
  'Content-Type': 'application/json',
  'Authorization': `Bearer ${piToken}`
},
                body: JSON.stringify({ listingId: listing._id })
              });
              if (delRes.ok) {
                alert("Listing deleted!");
                loadListings();
              } else {
                alert("Failed to delete listing");
              }
            }
          };
          item.appendChild(deleteBtn);
        }

        listDiv.appendChild(item);
      });
    }

    document.getElementById('searchInput')
  .addEventListener('input', applyFilters);

document.getElementById('countryFilter')
  .addEventListener('change', applyFilters);
function populateCountryFilter() {
  const countrySelect = document.getElementById('country');
  const filterSelect = document.getElementById('countryFilter');

  // مسح الدول القديمة (نترك All Countries)
  filterSelect.innerHTML = '<option value="">🌍 All Countries</option>';

  for (let option of countrySelect.options) {
    if (option.value) {
      const newOption = document.createElement('option');
      newOption.value = option.value;
      newOption.textContent = option.textContent;
      filterSelect.appendChild(newOption);
    }
  }
}
document.getElementById('logout-btn').onclick = () => {
  // حذف بيانات الجلسة
  currentUser = null;
  piToken = null;

  // إخفاء التطبيق
  document.getElementById('app-section').classList.add('hidden');
  document.getElementById('listings-section').classList.add('hidden');

  // إظهار صفحة تسجيل الدخول
  document.getElementById('login-section').classList.remove('hidden');

  // إعادة الزر والنموذج لحالتهم الأصلية
  document.getElementById('add-listing-btn').classList.remove('hidden');
  document.getElementById('listing-form').classList.add('hidden');

  // مسح الرسالة
  document.getElementById('status').innerHTML = '';

  alert("You have been logged out.");
};

  </script>
